name: build-contract
on:
  workflow_dispatch:
  push:
    paths:
      - 'contracts/agent-registry/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup reads contracts/agent-registry/rust-toolchain.toml and installs
      # the pinned nightly + wasm target — single source of truth for the toolchain.
      - name: Build wasm
        working-directory: contracts/agent-registry
        run: |
          rustup show
          cargo build --release --target wasm32-unknown-unknown --locked
      - name: Strip debug sections
        working-directory: contracts/agent-registry
        run: |
          sudo apt-get update && sudo apt-get install -y wabt || true
          wasm-strip target/wasm32-unknown-unknown/release/agent-registry.wasm || true
      - uses: actions/upload-artifact@v4
        with:
          name: agent-registry-wasm
          path: contracts/agent-registry/target/wasm32-unknown-unknown/release/agent-registry.wasm
